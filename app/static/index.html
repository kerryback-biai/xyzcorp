<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYZ Corp — Data Simulation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/flatly/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Top navbar -->
    <nav class="navbar navbar-dark bg-primary px-3">
        <span class="navbar-brand mb-0 h1">XYZ Corp — Data Simulation</span>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white" id="user-name"></span>
            <a href="/admin.html" id="admin-link" class="btn btn-outline-light btn-sm" style="display:none;">&#9881;</a>
            <button class="btn btn-outline-light btn-sm" id="new-chat-btn">New Chat</button>
            <button class="btn btn-outline-light btn-sm" id="logout-btn">Logout</button>
        </div>
    </nav>

    <!-- Chat area -->
    <div id="chat-container">
        <div id="messages"></div>
        <div id="input-area">
            <form id="chat-form">
                <div class="input-group">
                    <textarea id="user-input" class="form-control" rows="2"
                              placeholder="Ask a question about XYZ Corp data..."
                              autofocus></textarea>
                    <button type="submit" class="btn btn-primary" id="send-btn">Send</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.0/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/highlight.min.js"></script>
    <script src="/js/chat.js"></script>
</body>
</html>
