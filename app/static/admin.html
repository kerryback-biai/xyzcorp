<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Data Assistant — Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/flatly/bootstrap.min.css">
    <style>
        body { background: #f8f9fa; }
        .admin-container { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem; }
        .cost { font-family: monospace; }
        .badge-admin { background: #2c3e50; }
        .badge-active { background: #27ae60; }
        .badge-inactive { background: #e74c3c; }
        .usage-row { font-size: 0.85rem; }
        .stat-card { text-align: center; padding: 1.5rem; }
        .stat-card .value { font-size: 2rem; font-weight: bold; color: #2c3e50; }
        .stat-card .label { color: #6c757d; font-size: 0.85rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary px-3">
        <span class="navbar-brand mb-0 h1">Admin Dashboard</span>
        <div class="d-flex gap-3">
            <a href="/index.html" class="btn btn-outline-light btn-sm">Back to Chat</a>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="admin-container">
        <!-- Summary cards -->
        <div class="row mb-4" id="stats-row">
            <div class="col-md-3"><div class="card stat-card"><div class="value" id="stat-users">-</div><div class="label">Users</div></div></div>
            <div class="col-md-3"><div class="card stat-card"><div class="value" id="stat-cost">-</div><div class="label">Total Cost</div></div></div>
            <div class="col-md-3"><div class="card stat-card"><div class="value" id="stat-queries">-</div><div class="label">API Calls</div></div></div>
            <div class="col-md-3"><div class="card stat-card"><div class="value" id="stat-tokens">-</div><div class="label">Total Tokens</div></div></div>
        </div>

        <!-- Add user form -->
        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Users</h5>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-primary btn-sm" data-bs-toggle="collapse" data-bs-target="#csv-upload-form">Upload CSV</button>
                    <button class="btn btn-primary btn-sm" data-bs-toggle="collapse" data-bs-target="#add-user-form">+ Add User</button>
                </div>
            </div>
            <div class="collapse" id="csv-upload-form">
                <div class="card-body border-bottom">
                    <form id="csv-form" class="row g-2 align-items-end">
                        <div class="col-md-6">
                            <label class="form-label">CSV file (columns: email, password, name, spending_limit)</label>
                            <input type="file" class="form-control form-control-sm" id="csv-file" accept=".csv" required>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-success btn-sm w-100">Upload</button>
                        </div>
                    </form>
                    <div class="alert alert-success mt-2" id="csv-success" style="display:none;"></div>
                    <div class="alert alert-danger mt-2" id="csv-error" style="display:none;"></div>
                </div>
            </div>
            <div class="collapse" id="add-user-form">
                <div class="card-body border-bottom">
                    <form id="create-user-form" class="row g-2 align-items-end">
                        <div class="col-md-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control form-control-sm" id="new-email" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control form-control-sm" id="new-name">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Password</label>
                            <input type="text" class="form-control form-control-sm" id="new-password" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Limit ($)</label>
                            <input type="number" class="form-control form-control-sm" id="new-limit" value="10" step="1" min="1">
                        </div>
                        <div class="col-md-1">
                            <button type="submit" class="btn btn-success btn-sm w-100">Create</button>
                        </div>
                    </form>
                    <div class="alert alert-success mt-2" id="create-success" style="display:none;"></div>
                    <div class="alert alert-danger mt-2" id="create-error" style="display:none;"></div>
                </div>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Email</th>
                            <th>Name</th>
                            <th>Status</th>
                            <th>Limit</th>
                            <th class="text-end">Spent</th>
                            <th class="text-end">Remaining</th>
                        </tr>
                    </thead>
                    <tbody id="users-table"></tbody>
                </table>
            </div>
        </div>

        <!-- Usage log -->
        <div class="card">
            <div class="card-header"><h5 class="mb-0">Recent API Usage</h5></div>
            <div class="card-body p-0">
                <table class="table table-sm mb-0">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>User</th>
                            <th class="text-end">Input</th>
                            <th class="text-end">Output</th>
                            <th class="text-end">Cache</th>
                            <th class="text-end">Cost</th>
                        </tr>
                    </thead>
                    <tbody id="usage-table"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
